<!DOCTYPE html>
<html lang="es-MX">

<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <meta
    name="theme-color"
    content="#0F172A"
  />

  <meta
    name="robots"
    content="index, follow"
    data-rh="true"
  />

  <meta
    name="author"
    content="Tecnologías Administrativas ELAD"
  />

  <!-- SEO de respaldo.
       react-helmet-async reemplazará estas etiquetas
       en las páginas que tengan SEO dinámico. -->
  <title data-rh="true">
    Tecnologías Administrativas ELAD | Soluciones digitales para empresas
  </title>

  <meta
    name="description"
    content="Desarrollo de software, tiendas en línea, puntos de venta, marketing digital, sistemas administrativos y soluciones tecnológicas para empresas."
    data-rh="true"
  />

  <meta
    name="keywords"
    content="tecnologías administrativas, software empresarial, tiendas en línea, punto de venta, marketing digital, sistemas administrativos, transformación digital"
    data-rh="true"
  />

  <link
    rel="canonical"
    href="https://tecnologiasadministrativas.com/"
    data-rh="true"
  />

  <!-- Open Graph -->
  <meta
    property="og:locale"
    content="es_MX"
    data-rh="true"
  />

  <meta
    property="og:type"
    content="website"
    data-rh="true"
  />

  <meta
    property="og:site_name"
    content="Tecnologías Administrativas ELAD"
    data-rh="true"
  />

  <meta
    property="og:url"
    content="https://tecnologiasadministrativas.com/"
    data-rh="true"
  />

  <meta
    property="og:title"
    content="Tecnologías Administrativas ELAD"
    data-rh="true"
  />

  <meta
    property="og:description"
    content="Impulsa tu empresa con desarrollo de software, tiendas en línea, puntos de venta, automatización y soluciones digitales."
    data-rh="true"
  />

  <meta
    property="og:image"
    content="https://tecnologiasadministrativas.com/logo192.png"
    data-rh="true"
  />

  <meta
    property="og:image:alt"
    content="Logotipo de Tecnologías Administrativas ELAD"
    data-rh="true"
  />

  <!-- Twitter Card -->
  <meta
    name="twitter:card"
    content="summary_large_image"
    data-rh="true"
  />

  <meta
    name="twitter:title"
    content="Tecnologías Administrativas ELAD"
    data-rh="true"
  />

  <meta
    name="twitter:description"
    content="Soluciones digitales, software empresarial, tiendas en línea, puntos de venta y automatización para empresas."
    data-rh="true"
  />

  <meta
    name="twitter:image"
    content="https://tecnologiasadministrativas.com/logo192.png"
    data-rh="true"
  />

  <meta
    name="twitter:image:alt"
    content="Logotipo de Tecnologías Administrativas ELAD"
    data-rh="true"
  />

  <!-- Iconos y PWA -->
  <link
    rel="icon"
    href="%PUBLIC_URL%/logoTAE.png"
  />

  <link
    rel="apple-touch-icon"
    href="%PUBLIC_URL%/logo192.png"
  />

  <link
    rel="manifest"
    href="%PUBLIC_URL%/manifest.json"
  />

  <!-- Iconos externos -->
  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css"
    rel="stylesheet"
  />
</head>

<body
  data-bs-spy="scroll"
  data-bs-target=".navbar"
  data-bs-offset="60"
>
  <noscript>
    Necesitas habilitar JavaScript para ejecutar esta aplicación.
  </noscript>

  <div id="root"></div>
</body>

</html>
